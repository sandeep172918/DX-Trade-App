services:
  postgres:
    image: postgres:15-alpine
    container_name: dx-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: dx-trade-db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dx-trade-db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dx-redis
    ports:
      - "6380:6379"
      
  backend:
    build:
      context: .
    container_name: dx-backend
    ports:
      - "8090:8090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/dx-trade-db
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
